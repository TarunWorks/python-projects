<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urgent Question by Jayant!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation; /* Mobile zoom issues fix */
        }

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Screen se bahar kuch nahi jayega */
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        h1 { color: #ff4757; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #2f3542; font-weight: 600; font-size: 0.9rem; }

        .btn-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #yesBtn {
            background-color: #ff4757;
            color: white;
            z-index: 11;
        }

        #noBtn {
            background-color: #2f3542;
            color: white;
            position: fixed; 
            /* Smooth movement on mobile */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            white-space: nowrap;
        }

        #noBtn.defeated {
            position: static;
            background-color: #bdc3c7;
            color: #7f8c8d;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            margin-top: 10px;
        }

        #message {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            line-height: 1.5;
        }

        .highlight { color: #ffeaa7; font-size: 1.8rem; }

        .falling-item {
            position: fixed;
            font-size: 25px;
            animation: fall linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="box" id="mainBox">
        <h1 id="question">Kya tum aaj mere saath Momos khane chalogi? 🥟</h1>
        <p id="subtext">Jayant Malik ka offer hai, reject karna impossible hai!</p>

        <div class="btn-container" id="btnWrapper">
            <button id="yesBtn" onclick="accepted()">Haan, Chalo! ❤️</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">Bilkul Nahi</button>
        </div>

        <div id="message">
            <span class="highlight">That's my girl! ❤️</span><br>
            Jayant Malik ko 'Na' bolna impossible hai. Jaldi taiyar ho jao! 🚗✨
        </div>
    </div>

    <script>
        let isDefeated = false;

        function moveButton() {
            if (isDefeated) return;

            const btn = document.getElementById('noBtn');
            
            // Mobile viewport size calculation
            const padding = 20;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            // Button dimensions
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;

            // Generate random position within safe boundaries
            let randomX = Math.floor(Math.random() * (screenWidth - btnWidth - (padding * 2))) + padding;
            let randomY = Math.floor(Math.random() * (screenHeight - btnHeight - (padding * 2))) + padding;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function accepted() {
            isDefeated = true;
            
            document.getElementById('question').style.display = 'none';
            document.getElementById('subtext').style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            
            const noBtn = document.getElementById('noBtn');
            noBtn.classList.add('defeated');
            noBtn.innerText = "Okay fine, Jayant jeet gaya! 🏳️";
            
            document.getElementById('message').style.display = 'block';
            document.getElementById('mainBox').style.background = 'rgba(255, 71, 87, 0.85)';
            
            celebrate();
        }

        function celebrate() {
            const emojis = ['🥟', '❤️', '✨'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const item = document.createElement('div');
                    item.className = 'falling-item';
                    item.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    item.style.left = Math.random() * 100 + 'vw';
                    item.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(item);
                    setTimeout(() => item.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
