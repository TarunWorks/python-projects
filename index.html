<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarun Tomar | Tech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; 
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Navigation Bar */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 20;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .logo span {
            font-size: 0.8rem;
            font-weight: 400;
            color: #a1a1aa; 
            letter-spacing: 0;
            text-transform: lowercase;
        }

        .nav-btn {
            background: transparent;
            color: #e4e4e7;
            border: 1px solid rgba(255, 255, 255, 0.25); 
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Center Content */
        .main-content {
            text-align: center;
            z-index: 10;
            position: relative;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 4rem; /* Slightly reduced to fit the new text perfectly */
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        h1 .dim {
            color: #cbd5e1; 
        }

        .subtitle {
            font-size: 1.25rem; 
            color: #a1a1aa; 
            font-weight: 400;
            margin-bottom: 3.5rem;
            letter-spacing: 0.3px;
            line-height: 1.6; /* Added line height for the two lines of text */
        }

        /* Minimalist Pill Button */
        .poke-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.35); 
            padding: 14px 32px;
            font-size: 1.05rem; 
            font-weight: 400;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .poke-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.7);
            transform: scale(1.02);
        }

        .poke-btn:active {
            transform: scale(0.98);
        }

        /* Funny Message Area */
        #funny-message {
            margin-top: 2rem;
            height: 20px;
            font-size: 1.1rem; 
            color: #d4d4d8; 
            font-weight: 400;
            transition: opacity 0.3s ease;
        }

        /* Crosshair Aesthetic */
        .crosshairs {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .line {
            position: absolute;
            background: rgba(255, 255, 255, 0.15); 
        }

        .line-h-left { top: 40%; left: 10%; width: 15%; height: 1px; }
        .line-h-right { top: 40%; right: 10%; width: 15%; height: 1px; }
        .line-v-top { top: 15%; left: 30%; width: 1px; height: 15%; }
        .line-v-top-right { top: 15%; right: 30%; width: 1px; height: 15%; }

        .plus { position: absolute; color: rgba(255, 255, 255, 0.4); font-size: 12px; }
        .plus-1 { top: calc(40% - 7px); left: 25%; }
        .plus-2 { top: calc(40% - 7px); right: 25%; }

        /* Bottom Curved Horizon Glow */
        .horizon {
            position: absolute;
            bottom: -60vh;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            border-radius: 50%;
            background: radial-gradient(circle at top, #18181b 0%, #09090b 70%); 
            box-shadow: 0 -1px 40px rgba(255, 255, 255, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            z-index: 5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            nav { padding: 1.5rem 2rem; }
            .line { display: none; }
            .plus { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><span>Developed by</span><br>Tarun Tomar</div>
        <a href="https://taruntomar.me" class="nav-btn">Visit TarunTomar.me</a>
    </nav>

    <div class="crosshairs">
        <div class="line line-h-left"></div>
        <div class="plus plus-1">+</div>
        <div class="line line-h-right"></div>
        <div class="plus plus-2">+</div>
        <div class="line line-v-top"></div>
        <div class="line line-v-top-right"></div>
    </div>

    <div class="main-content">
        <h1>Site under<br><span class="dim">construction...</span></h1>
        
        <p class="subtitle">
            Developer is still learning 😅<br>
            Good things take time 🚀
        </p>

        <button class="poke-btn" id="pokeBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            Poke the Developer
        </button>

        <p id="funny-message"></p>
    </div>

    <div class="horizon"></div>

    <script>
        const messages = [
            "Bhai, aise click karne se website jaldi nahi banegi! 😅",
            "Ouch! Code break ho jayega bhai, mat kar. 🐛",
            "Accha theek hai, VS Code khol raha hu... 💻",
            "Error 404: Motivation not found. ☕",
            "Ek kaam kar, jab tak upar se meri .me check kar le! 🏃‍♂️",
            "Patience naam ki cheez suni hai? 🧘‍♂️",
            "Server pe load mat daal bhai. 🛑",
            "Lagta hai tera mouse naya hai. 🖱️",
            "Refresh karke dekh le, kuch nahi badlega. 🔄",
            "Main backend theek kar raha hu, tu frontend mat tod! 🛠️",
            "Bas kar bhai, keyboard toot jayega! 😭",
            "Ab main kuch nahi bolunga. 🤐",
            "...",
            "Sach mein? Abhi bhi click kar raha hai? 🤖",
            "Tujhe aur koi kaam nahi hai kya? 🥱",
            "Mera coffee break chal raha hai. ☕",
            "Deploy karne de bhai, dhyan bhatak raha hai. 🚀",
            "Ek click aur kiya na toh... kuch nahi karunga, par bura lagega. 🥺",
            "Bug dhoondh raha tha, tu hi mil gaya. 🐞",
            "Is button se meri salary nahi badhne wali. 💸",
            "StackOverflow pe iska solution nahi hai. 🤷‍♂️",
            "Ctrl+Z daba de meri zindagi mein. ⏪",
            "Tu CSS jaisa hai, samajh hi nahi aa raha. 🎨",
            "Lagta hai tera loop Infinite ho gaya hai. ♾️",
            "Battery bacha le phone ki, jaake reels dekh le. 📱",
            "Aise poke karega toh main production mein bug daal dunga! 💣",
            "Main chala ChatGPT se code likhwane. 🤖",
            "Maa kasam, agla click kiya toh screen blue ho jayegi. 🪟",
            "Achha bata, kitne clicks ka target hai tera? 🎯",
            "Meri maa ne sikhaya tha, aise anjaan buttons pe click nahi karte. 🙅‍♂️",
            "System overloaded. Bhaag yaha se! 🚨",
            "Tu nahi maanega na? 🤦‍♂️",
            "Yeh button ab thak chuka hai. It needs rest. 🛌",
            "RIP Mouse Left Click (202X - 2026). 🪦",
            "You broke the button. Happy now? 💥",
            "Ab iske aage mere paas koi dialogue nahi hai. 🎬",
            "Seriously, I'm out of jokes. 🪫",
            "Okay, you win. I lose. 🏆",
            "Bye. 👋",
            "..."
        ];

        let clickCount = 0;
        const btn = document.getElementById('pokeBtn');
        const msgDisplay = document.getElementById('funny-message');

        btn.addEventListener('click', () => {
            msgDisplay.style.opacity = 0;
            
            setTimeout(() => {
                if (clickCount < messages.length) {
                    msgDisplay.innerText = messages[clickCount];
                } else {
                    msgDisplay.innerText = `You have clicked ${clickCount + 1} times. Go touch some grass 🌱`;
                }
                msgDisplay.style.opacity = 1;
                clickCount++;
            }, 150);
        });
    </script>

</body>
</html>
